<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Media Tools{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>

  <div class="nav-wrap">
    <nav class="nav-inner">
      <a href="/" class="nav-brand">Media Tools</a>
      <div class="nav-links">
        <a href="/green-to-red/" role="button">Spotify to MP3</a>
        <a href="/edl-to-archive/" role="button">EDL to Archive</a>
        <a href="/yt-bulk-dl/" role="button">YT Bulk DL</a>
        {% if request.headers.get("x-user-role") == "admin" %}
        <a href="/admin/" role="button">Admin</a>
        {% endif %}
        {% if request.headers.get("x-user-id") %}
        <a href="/account" role="button">Settings</a>
        <form method="post" action="/logout" style="display:inline;margin:0">
          <button type="submit">Sign Out</button>
        </form>
        {% endif %}
      </div>
    </nav>
  </div>

  <main class="page-container">
    {% block content %}{% endblock %}
  </main>

  <footer class="page-container">
    <small>Media Tools — self-hosted collection</small>
  </footer>

</body>
</html>
