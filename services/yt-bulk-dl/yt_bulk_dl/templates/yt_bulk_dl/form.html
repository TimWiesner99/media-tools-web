{% extends "base.html" %}

{% block title %}YT Bulk Download{% endblock %}

{% block content %}
<div class="panel">
  <div class="panel-header">▶ YouTube Bulk Download</div>
  <div class="panel-body">

    <p>Enter YouTube URLs to download as MP4 (H.264 + AAC). One URL per line. Lines starting with <code>#</code> are treated as comments.</p>

    {% if error %}
    <div class="error-banner"><strong>Error:</strong> {{ error }}</div>
    {% endif %}

    <form method="post" action="convert">
      <label for="urls_text">
        YouTube URLs
        <textarea
          id="urls_text"
          name="urls_text"
          rows="10"
          placeholder="https://www.youtube.com/watch?v=…&#10;# optional comment&#10;https://www.youtube.com/watch?v=…"
          required
          autofocus
        >{{ urls_text or "" }}</textarea>
      </label>

      <div class="form-grid">
        <label>
          Filename prefix <span class="tooltip-icon" data-tooltip="Optional. Prepended to every output filename — e.g. prefix_title.mp4. Letters, numbers, underscores and hyphens only.">?</span>
          <input
            type="text"
            name="prefix"
            value="{{ prefix or '' }}"
            placeholder="e.g. DL_monday"
            pattern="[\w\-]+"
            title="Letters, numbers, underscores and hyphens only"
          />
        </label>
        <label>
          Max title length <span class="tooltip-icon" data-tooltip="Character limit for the title portion of the filename. Default is 40.">?</span>
          <input
            type="number"
            name="max_length"
            value="{{ max_length or 40 }}"
            min="10"
            max="100"
          />
        </label>
      </div>

      <div class="form-actions">
        <button type="submit">Start download</button>
      </div>
    </form>

  </div>
</div>
{% endblock %}
