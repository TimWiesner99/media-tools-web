{% extends "base.html" %}

{% block title %}Sign In — Media Tools{% endblock %}

{% block main_class %} login-main{% endblock %}
{% block nav_links %}{% endblock %}

{% block content %}

<div class="panel">
  <div class="panel-header">Sign In</div>
  <div class="panel-body">

    <div class="login-intro">
      <div>
        <div class="login-title">Media Tools</div>
        <div class="login-subtitle">Enter your credentials to continue.</div>
      </div>
    </div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form id="login-form" method="post" action="/login" onsubmit="return hashAndSubmit(event)">
      <input type="hidden" name="next_url" value="{{ next }}" />
      <input type="hidden" name="password_hash" id="password-hash-field" />

      <table class="login-form-table">
        <tr>
          <td><label for="username">User name:</label></td>
          <td><input type="text" id="username" name="username" required autofocus /></td>
        </tr>
        <tr>
          <td><label for="password-input">Password:</label></td>
          <td><input type="password" id="password-input" autocomplete="current-password" required /></td>
        </tr>
      </table>

      <div class="login-buttons">
        <button type="submit">OK</button>
        <a href="/" role="button">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
async function hashAndSubmit(event) {
  event.preventDefault();
  const password = document.getElementById('password-input').value;
  if (!password) return false;
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('password-hash-field').value = hashHex;
  // Clear plaintext before submit
  document.getElementById('password-input').value = '';
  event.target.submit();
  return false;
}
</script>
{% endblock %}
