<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Media Tools{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>

  <div class="nav-wrap">
    <nav class="nav-inner">
      <a href="/" class="nav-brand">
        <img src="/static/vpro outline-open.svg" alt="VPRO" class="nav-logo" />
        Media Tools
      </a>
      {% block nav_links %}
      <div class="nav-links">
        <a href="/green-to-red/" role="button">Spotify to MP3</a>
        <a href="/edl-to-archive/" role="button">EDL to Archive</a>
        <a href="/yt-bulk-dl/" role="button">YT Bulk DL</a>
        {% if user is defined and user and user.role == "admin" %}
        <a href="/admin/" role="button">Admin</a>
        {% endif %}
        {% if user is defined and user %}
        <a href="/account" role="button">Settings</a>
        <form method="post" action="/logout" class="form-inline">
          <button type="submit">Sign Out</button>
        </form>
        {% endif %}
      </div>
      {% endblock %}
    </nav>
  </div>

  <main class="page-container{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <footer class="page-container">
    <img src="/static/medialab-logo-2025.svg" alt="Medialab" class="footer-logo" />
    <small>Media Tools — self-hosted collection</small>
  </footer>

</body>
</html>
